<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Practicando CSS Grid</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    
    .contenedor {
      background-color: #f0f0f0;
      padding: 10px;
      margin-bottom: 30px;
      border: 2px solid #333;
    }
    
    .item {
      background-color: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
      border: 1px solid white;
    }
    
.contenedor {
  display: grid;
  grid-template-columns: 200px 1fr;
  grid-template-rows: 100px 1fr 80px;
  grid-template-areas:
    "header  header"
    "sidebar contenido"
    "footer  footer";
  gap: 10px;
  height: 100vh;
}

.header {
  grid-area: header;
}

.sidebar {
  grid-area: sidebar;
}

.contenido {
  grid-area: contenido;
}

.footer {
  grid-area: footer;
}
     /* Aquí irán tus experimentos con Grid */
    
  </style>
</head>
<body>
  <h1>Experimentando con CSS Grid</h1>
  
  <h2>Grid básico</h2>
  <div class="contenedor">
    <div class="item header">Header</div>
    <div class="item sidebar">Sidebar</div>
    <div class="item contenido">Contenido</div>
    <div class="item footer">Footer</div>
</div>
  </div>
</body>
</html>
