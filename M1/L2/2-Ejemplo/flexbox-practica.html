<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Practicando Flexbox</title>
  <style>
    /* Estilos básicos para visualizar mejor */
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
     .contenedor {
      display: flex;
      flex-wrap: nowrap;
      height: 200px;  /* Agregamos altura para ver la alineación vertical */
      align-items: stretch;  /* Default: estira para llenar altura */
      background-color: #f0f0f0;
      padding: 10px;
      margin-bottom: 20px;
      justify-content: space-around; /* Distribuye los items con espacio alrededor */
      
    }

    .item {
      background-color: #7a4caf;
      color: white;
      padding: 20px;
      margin: 5px;
      text-align: center;
    }

    /* Aquí irán tus experimentos con Flexbox */

  </style>
</head>

<body>
  <h1>Experimentando con Flexbox</h1>

  <h2>Ejemplo básico</h2>
  <div class="contenedor">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
    <div class="item">Item 4</div>
    <div class="item">Item 5</div>
    <div class="item">Item 6</div>
  </div>
</body>

</html>
