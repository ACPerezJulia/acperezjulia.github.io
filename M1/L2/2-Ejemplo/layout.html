<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Layout con Grid</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
    }
    
    .page {
      display: grid;
      grid-template-columns: 250px 1fr;
      grid-template-rows: 80px 1fr 60px;
      grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
      gap: 0;
      min-height: 100vh;
    }
    
    .header {
      grid-area: header;
      background-color: #333;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .sidebar {
      grid-area: sidebar;
      background-color: #f4f4f4;
      padding: 2rem 1rem;
    }
    
    .main {
      grid-area: main;
      padding: 2rem;
    }
    
    .footer {
      grid-area: footer;
      background-color: #333;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-areas:
          "header"
          "main"
          "sidebar"
          "footer";
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div>Logo</div>
      <nav>Navegación</nav>
    </header>
    
    <aside class="sidebar">
      <h3>Sidebar</h3>
      <ul>
        <li>Enlace 1</li>
        <li>Enlace 2</li>
        <li>Enlace 3</li>
      </ul>
    </aside>
    
    <main class="main">
      <h1>Contenido Principal</h1>
      <p>Este es el contenido principal de la página.</p>
    </main>
    
    <footer class="footer">
      <p>Copyright 2026</p>
    </footer>
  </div>
</body>
</html>
