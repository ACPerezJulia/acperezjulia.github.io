<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paleta · Generador de Colores</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo">
        <span class="logo-dot" aria-hidden="true"></span>
        paleta
      </h1>
      <p class="tagline">generador de colores aleatorios</p>
      <button class="btn-theme" id="btn-theme" aria-label="Cambiar tema claro/oscuro" title="Cambiar tema">
        <span id="theme-icon">☀️</span>
      </button>
    </div>
  </header>

  <main class="main-content">

    <!-- CONTROLS -->
    <section class="controls" aria-label="Controles de generación">

      <div class="control-group">
        <span class="control-label">Tamaño</span>
        <div class="segmented" role="group" aria-label="Número de colores">
          <button class="seg-btn active" data-size="6" aria-pressed="true">6</button>
          <button class="seg-btn" data-size="8" aria-pressed="false">8</button>
          <button class="seg-btn" data-size="9" aria-pressed="false">9</button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Formato</span>
        <div class="segmented" role="group" aria-label="Formato de color">
          <button class="seg-btn active" data-format="hex" aria-pressed="true">HEX</button>
          <button class="seg-btn" data-format="hsl" aria-pressed="false">HSL</button>
        </div>
      </div>

      <button class="btn-generate" id="btn-generate" aria-label="Generar nueva paleta de colores">
        <span class="btn-icon" aria-hidden="true">◈</span>
        Generar paleta
      </button>

      <button class="btn-unlock-all hidden" id="btn-unlock-all" aria-label="Desbloquear todos los colores">
        🔓 Desbloquear todo
      </button>

    </section>

    <!-- PALETTE GRID -->
    <section class="palette-section" aria-label="Paleta de colores generada">
      <div class="palette-grid" id="palette-grid" role="list">
        <!-- cards generated by JS -->
      </div>
    </section>

    <!-- SAVED PALETTES -->
    <section class="saved-section" aria-label="Paletas guardadas" id="saved-section">
      <header class="saved-header">
        <h2 class="saved-title">Paletas guardadas</h2>
        <button class="btn-clear-all" id="btn-clear-all" aria-label="Eliminar todas las paletas guardadas">Limpiar todo</button>
      </header>
      <ul class="saved-list" id="saved-list" aria-label="Lista de paletas guardadas">
        <!-- saved palettes rendered by JS -->
      </ul>
      <p class="empty-state" id="empty-state">Aún no hay paletas guardadas.</p>
    </section>

  </main>

  <footer class="site-footer">
    <p class="footer-hint">Clic en color para copiar · <kbd class="footer-key">Espacio</kbd> o <kbd class="footer-key">G</kbd> para generar · <span class="footer-key">🔒</span> para bloquear · <span class="footer-key">💾</span> para guardar</p>
    <p class="footer-copy">© ACPJ 2026 · Hecho con ❤︎</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
